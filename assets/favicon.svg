<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242c42" />
      <stop offset="100%" stop-color="#111726" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff80ab" />
      <stop offset="50%" stop-color="#e91e63" />
      <stop offset="100%" stop-color="#b0003a" />
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9f5e8" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>
  </defs>
  <!-- Background rounded box -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect width="504" height="504" x="4" y="4" rx="116" fill="none" stroke="url(#gold)" stroke-width="8" stroke-opacity="0.5" />
  
  <!-- Book shape -->
  <path d="M140 110 h180 a20 20 0 0 1 20 20 v250 a20 20 0 0 1 -20 20 h-180 a10 10 0 0 1 -10 -10 v-270 a10 10 0 0 1 10 -10 z" fill="#1d2539" stroke="url(#gold)" stroke-width="12" />
  
  <!-- Book spine -->
  <path d="M130 110 h30 v290 h-30 a10 10 0 0 1 -10 -10 v-270 a10 10 0 0 1 10 -10 z" fill="url(#gold)" />
  
  <!-- Book pages edge -->
  <path d="M340 125 h20 a10 10 0 0 1 10 10 v240 a10 10 0 0 1 -10 10 h-20 v-260 z" fill="url(#page)" />
  
  <!-- Emblem / CL lettering inside cover -->
  <path d="M255 200 c-30 0 -50 22 -50 55 c0 33 20 55 50 55 c18 0 32 -9 42 -24 l-22 -14 c-5 8 -11 12 -20 12 c-14 0 -22 -11 -22 -29 c0 -18 8 -29 22 -29 c9 0 15 4 20 12 l22 -14 c-10 -15 -24 -24 -42 -24 z" fill="url(#gold)" />
  
  <!-- Sparkles -->
  <path d="M370 170 l8 -20 l8 20 l20 8 l-20 8 l-8 20 l-8 -20 l-20 -8 z" fill="#ff80ab" />
  <path d="M170 360 l6 -14 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 z" fill="#ff80ab" />
</svg>
